<!DOCTYPE html>
<html>
<head>
    <title>Showdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        body {
            font-family: "Press Start 2P", sans-serif;
            font-size: 11px;
            cursor: url(assets/crosshair.png) 21 21, auto;
        }

        .pages{
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #gameplay-page {
            display:block;
        }

        canvas, #upperUI, #game-start, #game-over {
            position: absolute;
            top: 0;
            left: 0;
        }

        canvas {
            background: url(assets/game_arena.jpg);
            background-size: 1536px 695px;
            background-repeat: no-repeat;
            width: 1536px;
            height: 695px;
        }

        #upperUI {
            display: block;
        }

        #upperUI text {
            font-size: 13px;
            fill: white;
            stroke: black;
            stroke-width: 1px;
        }

        #player1-score {
            fill: red;
            stroke: red;
            stroke-width: 0.5px;
        }

        #player2-score {
            fill: blue;
            stroke: blue;
            stroke-width: 0.5px;
        }

        #p1-indicator{
            fill: red;
            display: none;
        }

        #p2-indicator{
            fill: blue;
            display: none;
        }

        #slot-container {
            position: absolute;
            left: 20px;
            bottom: 20px;
            display: flex;
            gap: 12px;               /* space between the two squares */
        }

        .slot {
            width: 100px;
            height: 100px;
            border: 4px solid grey;  /* medium thickness, grey by default */
            border-radius: 5%;
            background-color: rgb(255,255,255,0.4);
        }

        #ammo-container {
            position: absolute;
            right: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;      /* stack the <p> and <h3> */
            justify-content: center;     /* vertical centering */
            align-items: center;         /* horizontal centering */
            width: 200px;
            height: 100px;
            background-color: rgba(128,128,128,0.8);
            border-radius: 10%;
            gap: 12px;               /* space between the ammo label and ammo container */
        }

        #ammo-counter{
            color: white; 
            font-size: 30px;
        }

    </style>
</head>
<body>
    <!-- Gameplay Page -->
    <div id="gameplay-page" class = "pages">
        <p id = "connected-users"></p>
        <canvas width="1536px" height="695px"></canvas>

        <svg xmlns="http://www.w3.org/2000/svg" id="upperUI" viewBox="0 0 1000 50">
            <rect width="1000" height="50" x="0" y="0" fill="black" />
            <g id="healthBar-1">
                <line x1="10" y1="25" x2="300" y2="25" stroke="grey" stroke-width="24"/>
                <line id="player1-hpLine" x1="12" y1="25" x2="298" y2="25" stroke="red" stroke-width="20"/>
                <text x="15" y="35">P1:<tspan id="player1-HP">100</tspan></text>
            </g>
            <text x="320" y="34"><tspan id="p1-indicator">YOU</tspan></text>

            <g id="healthBar-2">
                <line x1="700" y1="25" x2="990" y2="25" stroke="grey" stroke-width="24"/>
                <line id="player2-hpLine" x1="702" y1="25" x2="988" y2="25" stroke="blue" stroke-width="20"/>
                <text x="910" y="35">P2:<tspan id="player2-HP">100</tspan></text>
            </g>
            <text x="640" y="34"><tspan id="p2-indicator">YOU</tspan></text>

            <text x="450" y="25">
                TIME:<tspan id="time-remaining">70</tspan>
            </text>

            <text x="465" y="40">
                <tspan id="player1-score">0</tspan> - <tspan id="player2-score">0</tspan>
            </text>
        </svg>

        <!-- Slot Container -->
        <div id="slot-container">
            <div id="weapon-slot" class="slot">
                <p style = "font-size: 8px;">Weapon (Q)</p>
            </div>
            <div id="item-slot" class="slot">
                <p style = "font-size: 8px;">Item (E)</p>
            </div>
        </div>

         <!-- Ammo Container -->
        <div id="ammo-container">
            <p style = "color: white; font-size: 12px;">AMMO</p>
            <p id = "ammo-counter">0</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
    <script src="/socket.io/socket.io.min.js"></script>
    <script src="startpageJS/socket.js"></script>

    <script src="gamepageJS/bounding_box.js"></script>
    <script src="gamepageJS/sprite.js"></script>
    <script src="gamepageJS/player.js"></script>
    <script src="gamepageJS/crate.js"></script>
    <script src="gamepageJS/weapon.js"></script>
    <script src="gamepageJS/potion.js"></script>
    
    <script>
        $(function () {
            // Draw arena border on the canvas
            window.playerId = 0; //socket can access this variable. store's player id (1 or 2)
            Socket.connect();

            const cv = $("canvas").get(0);
            const context = cv.getContext("2d");

            let totalRoundTime = 70;   // Total game time in seconds
            const itemMaxAge = 20000;   // 20 sec 
            let roundStartTime = 0;      // The timestamp when the game starts
            let round = 0;

            let mouseX = 0;
            let mouseY = 0;

            let animationId; // To store the requestAnimationFrame ID

            const gameArea = BoundingBox(context, 100 , 20, 675, 1516);//set gameArea
            const left = gameArea.getPoints().topLeft[0]+64-20;
            const right = gameArea.getPoints().topRight[0]-64+20;
            const bottom = gameArea.getPoints().bottomLeft[1]-64+25;
            const top = gameArea.getPoints().topLeft[1]+64-25;

            /* Create the sounds */
            const sounds = {
                weaponPickup: new Audio("assets/weapon_pickup.mp3")
            };

            /* create sprites */
            const obstacles = [ //obstacles
                //Four corners
                Crate(context, left, top, 3),
                Crate(context, right, top, 3),
                Crate(context, left, bottom, 3),
                Crate(context, right, bottom, 3),

                //Extra bottom left crate
                Crate(context, left + 128, bottom, 3),
                //Extra top right crate
                Crate(context, right - 128, top, 3),

                //top-left cluster
                Crate(context, left + 128, top, 2), //larger crates
                Crate(context, left, top + 128, 2),
                Crate(context, left, top + 128*2, 2),
                Crate(context, left + 128*2 - 64/2, top - 64/2, 1), //smaller crates
                //Crate(context, left + 128 - 64/2, top + 128 - 64/2, 1),

                //bottom-right cluster
                Crate(context, right - 128, bottom, 2), //larger crates
                Crate(context, right, bottom - 128, 2), 
                Crate(context, right, bottom - 128*2, 2), 
                Crate(context, right - 128*2 + 64/2, bottom + 64/2, 1), //smaller crates
                //Crate(context, right - 128 + 64/2, bottom - 128 + 64/2, 1),

                //center top
                Crate(context, (right+left)/2, top - 64/2, 1),
                Crate(context, (right+left)/2 + 128 - 64/2, top, 2),

                //center bottom
                Crate(context, (right+left)/2, bottom + 64/2, 1),
                Crate(context, (right+left)/2 - 128 + 64/2, bottom, 2),

                //center left obstacle
                Crate(context, (right+left)/4, (top+bottom)/2, 3),
                Crate(context, (right+left)/4 + 64*3/2, (top+bottom)/2 - 64*3/2, 1),

                 //center right obstacle
                Crate(context, (right+left)/4*3, (top+bottom)/2, 3),
                Crate(context, (right+left)/4*3 - 64*3/2, (top+bottom)/2 + 64*3/2, 1)
            ];

            const p1_init_pos = {x: left, y: top + 128*3};
            //const player2_init_pos = {x: right, y: bottom - 128*3};
            const p2_init_pos = {x: left+200, y: bottom - 128*3}; //test initial location
            const player1 = Player(context, p1_init_pos.x, p1_init_pos.y, 1, gameArea, obstacles); // The player 1
            const player2 = Player(context, p2_init_pos.x, p2_init_pos.y, 2, gameArea, obstacles); // The player 2 - test location

            const weapons = [
                Weapon(context, 427, 350, "AR"),       // weapon 1       
                Weapon(context, 427, 360, "AR"),       // weapon 2 
                Weapon(context, 427, 370, "AR")        // weapon 3 
            ];
            const potions = [
                Potion(context, 427, 350, "green"),    // potion 1
                Potion(context, 427, 350, "green")     // potion 2 
            ];
            // fixed points for the items, can be changed later
            const weaponPoints = [          
                {x: 450, y: 620}, 
                {x: 760, y: 380}, 
                {x: 1100, y: 160}
            ];
            const potionPoints = [
                {x: 480, y: 160}, 
                {x: 1050, y: 620}
            ];

            $("#weapon-slot").css("border-color", "green"); //User initially is on weapon slot.

            /* get cursor position */
            $(document).on('mousemove', function(event) {
                mouseX = event.pageX;
                mouseY = event.pageY;
                //console.log("Mouse position: X=" + mouseX + ", Y=" + mouseY);
            });


            /* key control */
            const keys = {}; // Object to keep track of pressed keys
            // Key handling for the slots and movement
            $(document).on("keydown", function (e) {
                if (!e.repeat) { // Optional: ensures the event only fires once per press, not continuously while held
                    keys[e.key] = true;
                }
                //slot handling
                if (keys['q']) {
                    // Left square becomes green, right resets to grey
                    $("#weapon-slot").css("border-color", "green");
                    $("#item-slot").css("border-color", "grey");

                    //send event ("equip weapon") to websocket
                } else if (keys['e']) {
                    // Right square becomes green, left resets to grey
                    $("#weapon-slot").css("border-color", "gray");
                    $("#item-slot").css("border-color", "green");

                    //send event ("equip item") to websocket
                }
            });

            $(document).keyup(function(e) {
                // Set the key's status to false when it is released
                delete keys[e.key]; // Deleting the property is efficient
            });

            //weapon pick up
            $(document).on("keydown", function(event) { 
                    if (event.keyCode == 70) {  // now the pick up button is F, can be changed later 
                        weapons.forEach((weapon, index) => {
                            const weaponPos = weapon.getXY();
                            if (player1.getBoundingBox().isPointInBox(weaponPos.x, weaponPos.y)) {
                                // Play collect sound
                                sounds.weaponPickup.currentTime = 0;     // play from the start 
                                sounds.weaponPickup.play(); 

                                weapon.randomize(gameArea);
                                weapon.setXY(-1000, -1000);
                                // Respawn after 10 seconds
                                setTimeout(() => {
                                    weapon.setXY(weaponPoints[index].x, weaponPoints[index].y);
                                }, 10000);
                            }
                        });
                    }
                });

            function getMovementVector() {
                let dx = 0, dy = 0;
                if (keys['w']) dy -= 1;   // north
                if (keys['s']) dy += 1;   // south
                if (keys['a']) dx -= 1;   // west
                if (keys['d']) dx += 1;   // east

                // If both axes are non‑zero we are moving diagonally → normalize
                if (dx !== 0 && dy !== 0) {
                    const length = Math.hypot(dx, dy); // √(dx²+dy²) == √2
                    dx /= length;
                    dy /= length;
                }
                return {dx, dy};
            }

            // Global functions that socket.js can call
            window.updatePlayerMovement = function(dx, dy, mouseX, mouseY, playerIndex) {
                if (playerIndex === 1 && player1) {
                    if (dx !== 0 || dy !== 0) {
                        player1.setVelocity(dx, dy);
                    } else {
                        player1.stop();
                    }
                    player1.setAngle(mouseX, mouseY);
                } else if (playerIndex === 2 && player2) {
                    if (dx !== 0 || dy !== 0) {
                        player2.setVelocity(dx, dy);
                    } else {
                        player2.stop();
                    }
                    player2.setAngle(mouseX, mouseY);
                }
            };

            //Get Player Id
            setTimeout(() => { //wait for connection to be fully established
                console.log('Attempting getPlayerNum');
                Socket.getPlayerNum();
                setTimeout(()=> {
                    console.log("You are Player "+ playerId);
                    if (playerId == 1){
                        $("#p1-indicator").css("display", "block");
                    } else if (playerId == 2){
                        $("#p2-indicator").css("display", "block");
                    }
                }, 100); //wait till the commmunication finishes
            }, 100); //wait till connection with server

            /* main processing of the game */
            function doFrame(now){
                if (roundStartTime == 0) roundStartTime = now;

                /* Update the time remaining */
                const roundTimeSoFar = now - roundStartTime;
                const timeRemaining = Math.ceil((totalRoundTime * 1000 - roundTimeSoFar) / 1000);
                $("#time-remaining").text(timeRemaining);

                if (timeRemaining <= 0){ //game duration is over
                    // Stop the game
                    cancelAnimationFrame(animationId);

                    // Optional: Show game over message
                    alert("Time's Up! Game Over");

                    // Remove event listeners to stop interaction
                    $(document).off("keydown keyup mousemove");

                    return; //change later
                }


                const {dx, dy} = getMovementVector();

                /*
                if (dx !== 0 || dy !== 0) {
                    // send the vector to the player; you can keep the old
                    // move(direction) API by translating (dx,dy)→direction,
                    // but a vector is far more flexible.
                    player1.setVelocity(dx, dy);
                } else {
                    player1.stop();   // no keys pressed → stop
                }

                //handle player orientation towards mouse/crosshair
                player1.setAngle(mouseX, mouseY);
                */

                //add web socket function here
                Socket.handlePlayerMovement(dx,dy,mouseX,mouseY);

                /* update sprites */
                player1.update(now);
                player2.update(now);
                weapons.forEach((weapon) => {
                    weapon.update(now); 
                });
                potions.forEach((potion) => {
                    potion.update(now);
                });

                /* Randomize the weapon */
                weapons.forEach((weapon, index) => {
                    if (weapon.getAge(now) >= itemMaxAge) {
                        weapon.randomize(); 
                        weapon.setXY(weaponPoints[index].x, weaponPoints[index].y); 
                    }
                });
                /* Randomize the potion */
                potions.forEach((potion, index) => {
                    if (potion.getAge(now) >= itemMaxAge) {
                        potion.randomize(); 
                        potion.setXY(potionPoints[index].x, potionPoints[index].y); 
                    }
                });

                /* Clear the screen */
                context.clearRect(0, 0, cv.width, cv.height);

                /* draw the sprites */
                for (let i = 0; i < obstacles.length; i++){ //obstcales are rendered first
                    obstacles[i].draw();
                }

                weapons.forEach((weapon) => {
                    weapon.draw(); 
                }) 

                potions.forEach((potion) => {
                    potion.draw(); 
                })

                player1.draw();

                player2.draw();

                /* Process the next frame */
                animationId = requestAnimationFrame(doFrame);
            }

            // Moving the Weapon + Potion at the Start of the Game
            weapons.forEach((weapon, index) => {
                weapon.randomize();
                weapon.setXY(weaponPoints[index].x, weaponPoints[index].y);
            }) 
            potions.forEach((potion, index) => {
                potion.randomize();
                potion.setXY(potionPoints[index].x, potionPoints[index].y);
            })          
            
            /* Start the game */
            setTimeout(()=>{
                animationId = requestAnimationFrame(doFrame);
            }, 200); //begin game after 100 microseconds. Why the delay? to wait for socket connection.
        });
    </script>
</body>
</html>
