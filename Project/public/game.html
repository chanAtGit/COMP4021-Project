<!DOCTYPE html>
<html>
<head>
    <title>Showdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        body {
            font-family: "Press Start 2P", sans-serif;
            font-size: 11px;
            cursor: url(assets/crosshair.png) 21 21, auto;
        }

        .pages{
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #gameplay-page {
            display:block;
        }

        canvas, #upperUI, #game-start, #game-over {
            position: absolute;
            top: 0;
            left: 0;
        }

        canvas {
            background: url(assets/game_arena.jpg);
            background-size: 1536px 695px;
            background-repeat: no-repeat;
            width: 1536px;
            height: 695px;
        }

        #upperUI {
            display: block;
        }

        #upperUI text {
            font-size: 13px;
            fill: white;
            stroke: black;
            stroke-width: 1px;
        }

        #player1-score {
            fill: red;
            stroke: red;
            stroke-width: 0.5px;
        }

        #player2-score {
            fill: blue;
            stroke: blue;
            stroke-width: 0.5px;
        }

        #p1-indicator{
            fill: red;
            display: none;
        }

        #p2-indicator{
            fill: blue;
            display: none;
        }

        #sudden-death-tag{
            fill: yellow;
            stroke: yellow;
            display: none;
        }

        .round-text, #result-text{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            pointer-events: none;
            display: block;
        }

        .round-text{
            font-size: 100px;
            color: white;
        }

        #result-text {
            display: none;
            font-size: 30px;
            color: white;
        }

        #slot-container {
            position: absolute;
            left: 20px;
            bottom: 20px;
            display: flex;
            gap: 12px;               /* space between the two squares */
        }

        .slot {
            position: relative; /* Add this line */
            width: 100px;
            height: 100px;
            border: 4px solid grey;  /* medium thickness, grey by default */
            border-radius: 5%;
            background-color: rgb(255,255,255,0.4);
            overflow: hidden; /* keep children inside */
            /* align items in the center */
            text-align: left; /* Keeps text aligned normally */
        }

        .slot .icon {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%) scale(1.5);
            image-rendering: pixelated;
            display: none;
            /* This centers the icon regardless of text position */
        }

        #ammo-container {
            position: absolute;
            right: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;      /* stack the <p> and <h3> */
            justify-content: center;     /* vertical centering */
            align-items: center;         /* horizontal centering */
            width: 200px;
            height: 100px;
            background-color: rgba(128,128,128,0.8);
            border-radius: 10%;
            gap: 12px;               /* space between the ammo label and ammo container */
        }

        #ammo-counter{
            color: white; 
            font-size: 30px;
        }

    </style>
</head>
<body>
    <!-- Gameplay Page -->
    <div id="gameplay-page" class = "pages">
        <!-- Hidden Stuff -->
        <p id = "connected-users"></p>
        <!-- Hidden Stuff END -->
        <canvas width="1536px" height="695px"></canvas>

        <svg xmlns="http://www.w3.org/2000/svg" id="upperUI" viewBox="0 0 1000 50">
            <rect width="1000" height="50" x="0" y="0" fill="black" />
            <g id="healthBar-1">
                <line x1="10" y1="25" x2="300" y2="25" stroke="grey" stroke-width="24"/>
                <line id="player1-hpLine" x1="12" y1="25" x2="298" y2="25" stroke="red" stroke-width="20"/>
                <text x="15" y="35">P1:<tspan id="player1-HP">100</tspan></text>
            </g>
            <text x="320" y="34"><tspan id="p1-indicator">YOU</tspan></text>

            <g id="healthBar-2">
                <line x1="700" y1="25" x2="990" y2="25" stroke="grey" stroke-width="24"/>
                <line id="player2-hpLine" x1="702" y1="25" x2="988" y2="25" stroke="blue" stroke-width="20"/>
                <text x="910" y="35">P2:<tspan id="player2-HP">100</tspan></text>
            </g>
            <text x="640" y="34"><tspan id="p2-indicator">YOU</tspan></text>

            <text x="450" y="25">
                TIME:<tspan id="time-remaining">70</tspan>
            </text>

            <text x="465" y="40">
                <tspan id="player1-score">0</tspan> - <tspan id="player2-score">0</tspan>
            </text>

            <text x="415" y="50"><tspan id = "sudden-death-tag">SUDDEN DEATH</tspan></text>
        </svg>

        <!-- Round Text -->
        <div class="round-text">ROUND 1</div>
        <div id = "result-text">P<span></span> won this round!</div>

        <!-- Slot Container -->
        <div id="slot-container">
            <div id="weapon-slot" class="slot">
                <p style = "font-size: 8px;">Weapon (Q)</p>
                <img class = "icon" id = "AR-icon" src = "assets/AR_icon.png"  alt="AR icon"/>
                <img class = "icon" id = "SMG-icon" src = "assets/SMG_icon.png"  alt="SMG icon"/>
                <img class = "icon" id = "shotgun-icon" src = "assets/shotgun_icon.png"  alt="SMG icon"/>
            </div>
            <div id="item-slot" class="slot">
                <p style = "font-size: 8px;">Item (E)</p>
                <img class = "icon" id = "green-potion-icon" src = "assets/green_pot_icon.png"  alt="def icon"/>
                <img class = "icon" id = "purple-potion-icon" src = "assets/purple_pot_icon.png"  alt="spd icon"/>
                <img class = "icon" id = "orange-potion-icon" src = "assets/orange_pot_icon.png"  alt="rge icon"/>
            </div>
        </div>

         <!-- Ammo Container -->
        <div id="ammo-container">
            <p style = "color: white; font-size: 12px;">AMMO</p>
            <p id = "ammo-counter">0</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
    <script src="/socket.io/socket.io.min.js"></script>
    <script src="startpageJS/socket.js"></script>

    <script src="gamepageJS/bounding_box.js"></script>
    <script src="gamepageJS/sprite.js"></script>
    <script src="gamepageJS/player.js"></script>
    <script src="gamepageJS/crate.js"></script>
    <script src="gamepageJS/weapon.js"></script>
    <script src="gamepageJS/potion.js"></script>
    <script src="gamepageJS/bullet.js"></script>
    
    <script>
        $(function () {
            // Draw arena border on the canvas
            window.playerId = 0; //socket can access this variable. store's player id (1 or 2)
            Socket.connect();

            $("#weapon-slot > img").hide(); //hide all weapons
            const cv = $("canvas").get(0);
            const context = cv.getContext("2d");

            let gameActive = false; //whether game is active or not. decides whether the player can interact yet.
            const totalRoundTime = 70;   // Total game time in seconds. originally 70
            const itemMaxAge = 20000;   // 20 sec 
            let roundStartTime = 0;      // The timestamp when the game starts
            let round_num = 1;

            let mouseX = 0;
            let mouseY = 0;

            let animationId; // To store the requestAnimationFrame ID

            const gameArea = BoundingBox(context, 100 , 20, 675, 1516);//set gameArea
            const left = gameArea.getPoints().topLeft[0]+64-20;
            const right = gameArea.getPoints().topRight[0]-64+20;
            const bottom = gameArea.getPoints().bottomLeft[1]-64+25;
            const top = gameArea.getPoints().topLeft[1]+64-25;

            //initial hpLine values
            const p1_hpLine_x2_init = 298;
            const p2_hpLine_x1_init = 702;

            let weaponType = null; //store current weapon type
            let potionType = null; //store current potion type

            let currentTime = 0;   // to be used in shooting bullets 

            /* Create the sounds */
            const sounds = {
                weaponPickup: new Audio("assets/weapon_pickup.mp3"),
                potionPickup: new Audio("assets/potion_pickup.mp3"),
                mainGame: new Audio("assets/main_game_music.mp3"), 
                AR: new Audio("assets/AR_sound.mp3"),
                SMG: new Audio("assets/SMG_sound.mp3"),
                shotgun: new Audio("assets/shotgun_sound.mp3"), 
                potionUse: new Audio("assets/potion_use.mp3") ,
                gameover: new Audio("assets/gameover_music.mp3")
            };

            /* create sprites */
            let obstacles = [ //obstacles
                //Four corners
                Crate(context, left, top, 3),
                Crate(context, right, top, 3),
                Crate(context, left, bottom, 3),
                Crate(context, right, bottom, 3),

                //Extra bottom left crate
                Crate(context, left + 128, bottom, 3),
                //Extra top right crate
                Crate(context, right - 128, top, 3),

                //top-left cluster
                Crate(context, left + 128, top, 2), //larger crates
                Crate(context, left, top + 128, 2),
                Crate(context, left, top + 128*2, 2),
                Crate(context, left + 128*2 - 64/2, top - 64/2, 1), //smaller crates
                //Crate(context, left + 128 - 64/2, top + 128 - 64/2, 1),

                //bottom-right cluster
                Crate(context, right - 128, bottom, 2), //larger crates
                Crate(context, right, bottom - 128, 2), 
                Crate(context, right, bottom - 128*2, 2), 
                Crate(context, right - 128*2 + 64/2, bottom + 64/2, 1), //smaller crates
                //Crate(context, right - 128 + 64/2, bottom - 128 + 64/2, 1),

                //center top
                Crate(context, (right+left)/2, top - 64/2, 1),
                Crate(context, (right+left)/2 + 128 - 64/2, top, 2),

                //center bottom
                Crate(context, (right+left)/2, bottom + 64/2, 1),
                Crate(context, (right+left)/2 - 128 + 64/2, bottom, 2),

                //center left obstacle
                Crate(context, (right+left)/4, (top+bottom)/2, 3),
                Crate(context, (right+left)/4 + 64*3/2, (top+bottom)/2 - 64*3/2, 1),

                 //center right obstacle
                Crate(context, (right+left)/4*3, (top+bottom)/2, 3),
                Crate(context, (right+left)/4*3 - 64*3/2, (top+bottom)/2 + 64*3/2, 1)
            ];
            const saved_obstacles = [...obstacles]; //used to restore obstacles after sudden death
            const p1_init_pos = {x: left, y: top + 128*3};
            //const player2_init_pos = {x: right, y: bottom - 128*3}; //true initial location
            const p2_init_pos = {x: left+200, y: bottom - 128*3}; //test initial location
            const player1 = Player(context, p1_init_pos.x, p1_init_pos.y, 1, gameArea, obstacles); // The player 1
            const player2 = Player(context, p2_init_pos.x, p2_init_pos.y, 2, gameArea, obstacles); // The player 2 - test location
            let player1_score = 0;
            let player2_score = 0;

            window.weapons = [
                Weapon(context, 427, 350, "AR"),       // weapon 1       
                Weapon(context, 427, 360, "AR"),       // weapon 2 
                Weapon(context, 427, 370, "AR")        // weapon 3 
            ];
            window.potions = [
                Potion(context, 427, 350, "green"),    // potion 1
                Potion(context, 427, 350, "green")     // potion 2 
            ];
            const bullets = []; //bullets to be rendered
            let ammo = 0; //stores player's current ammo
            //window.potions = potions;
            //window.weapons = weapons;
            // fixed points for the items, can be changed later
            const weaponPoints = [          
                {x: 450, y: 620}, 
                {x: 760, y: 380}, 
                {x: 1100, y: 160}
            ];
            const potionPoints = [
                {x: 480, y: 160}, 
                {x: 1050, y: 620}
            ];
            //item or action to status mapping
            const statusMap = {
                null: 0,
                SMG: 1,
                AR: 2,
                shotgun: 3,
                green: 4, //green potion
                orange: 6,
                purple: 8
            }

            $("#weapon-slot").css("border-color", "green"); //User initially is on weapon slot.

            /* get cursor position */
            $(document).on('mousemove', function(event) {
                mouseX = event.pageX;
                mouseY = event.pageY;
                //console.log("Mouse position: X=" + mouseX + ", Y=" + mouseY);
            });

            let infBullet = 0;
            let saved_ammo = null;
            let weaponSelected = 1; //whether the player is selected their weapon slot
            /* key control */
            const keys = {}; // Object to keep track of pressed keys
            // Key handling for the slots and movement
            $(document).on("keydown", function (e) {
                if (gameActive){
                    if (!e.repeat) { // Optional: ensures the event only fires once per press, not continuously while held
                        keys[e.key] = true;
                    }
                    //slot handling
                    if (keys['q']) {
                        if (weaponType && !weaponSelected){ //the user has a weapon and was on item slot
                            sounds.weaponPickup.currentTime = 0;     // play from the start
                            sounds.weaponPickup.play(); 
                        } 
                        // Left square becomes green, right resets to grey
                        $("#weapon-slot").css("border-color", "green");
                        $("#item-slot").css("border-color", "grey");
                        weaponSelected = 1;
                        Socket.changePlayerSprite(playerId, statusMap[weaponType]);
                    //send event ("equip weapon") to websocket
                    } else if (keys['e']) {
                        if (potionType && weaponSelected){ //the user has a potion and was on weapon slot
                            sounds.potionPickup.currentTime = 0;     
                            sounds.potionPickup.play(); 
                        } 
                        // Right square becomes green, left resets to grey
                        $("#weapon-slot").css("border-color", "gray");
                        $("#item-slot").css("border-color", "green");
                        weaponSelected = 0;
                        Socket.changePlayerSprite(playerId, statusMap[potionType]);
                        //send event ("equip item") to websocket
                    } else if (keys['i']){ //CHEAT KEY. Toggle infinite ammo
                        infBullet = !infBullet;
                        if (infBullet){
                            saved_ammo = ammo;
                            ammo = Infinity; //infinite ammo
                        } else {
                            ammo = saved_ammo;
                        }
                        $("#ammo-counter").text(ammo);
                    }
                }
            });

            $(document).keyup(function(e) {
                // Set the key's status to false when it is released
                delete keys[e.key]; // Deleting the property is efficient
            });

            //weapon pick up
            $(document).on("keydown", function(event) { 
                if (gameActive){
                    if (event.keyCode === 70) {  // now the pick up button is F, can be changed later 
                        weapons.forEach((weapon, index) => {
                            const weaponPos = weapon.getXY();
                            if ((player1.getBoundingBox().isPointInBox(weaponPos.x, weaponPos.y) && playerId == 1) ||
                                (player2.getBoundingBox().isPointInBox(weaponPos.x, weaponPos.y) && playerId == 2)) {
                                // Play collect sound
                                sounds.weaponPickup.currentTime = 0;     // play from the start 
                                sounds.weaponPickup.play(); 
                                // Socket.sendWeaponPickup(weaponPos.x, weaponPos.y);
                                // console.log(`before pick, weapon${JSON.stringify(weapon)})`);
                                // console.log(`before pick, window weapon${JSON.stringify(window.weapons)})`);

                                weaponType = weapon.weaponType;        // store current weapon type
                                console.log("You picked up weapon: " + weaponType);
                                let status = statusMap[weaponType];
                                //set ammo
                                if (weaponType == "AR"){
                                    if (!infBullet){
                                        ammo = 25; //set ammo count
                                    } else {
                                        saved_ammo = 25; //set ammo count
                                    }
                                    $("#weapon-slot > .icon").hide(); //hide all weapons
                                    $("#AR-icon").show();
                                    //status = 2;
                                } else if (weaponType == "SMG"){
                                    if (!infBullet){
                                        ammo = 30;
                                    } else {
                                        saved_ammo = 25; //set ammo count
                                    }
                                    $("#weapon-slot > .icon").hide(); //hide all weapons
                                    $("#SMG-icon").show();
                                    //status = 1;
                                } else {
                                    if (!infBullet){
                                        ammo = 6;
                                    } else {
                                        saved_ammo = 6; //set ammo count
                                    }
                                    $("#weapon-slot > .icon").hide(); //hide all weapons
                                    $("#shotgun-icon").show();
                                    //status = 3;
                                }
                                if(!infBullet) $("#ammo-counter").text(ammo); //update ammo-counter in html

                                
                                const newWeaponType = weapon.randomize();
                                Socket.sendWeaponPickup(weaponPos.x, weaponPos.y, newWeaponType);
                                if (weaponSelected) Socket.changePlayerSprite(playerId, status);
                                //console.log("New weapon spawned: " + newWeaponType);
                                //weapon.setXY(-1000, -1000); will fix later
                                // Respawn after 10 seconds
                                /*
                                setTimeout(() => {
                                    weapon.setXY(weaponPoints[index].x, weaponPoints[index].y);
                                }, 10000);*/
                            }
                        });
                    }
                }
            });

            //potion pick up
            $(document).on("keydown", function(event) { 
                if (gameActive){
                    if (event.keyCode === 70) {  // now the pick up button is F, can be changed later 
                        potions.forEach((potion, index) => {
                            const potionPos = potion.getXY();
                            if ((player1.getBoundingBox().isPointInBox(potionPos.x, potionPos.y) && playerId == 1) ||
                                (player2.getBoundingBox().isPointInBox(potionPos.x, potionPos.y) && playerId == 2)) {
                                // Socket.sendWeaponPickup(weaponPos.x, weaponPos.y);
                                // console.log(`before pick, weapon${JSON.stringify(weapon)})`);
                                // console.log(`before pick, window weapon${JSON.stringify(window.weapons)})`);

                                if (potionType === potion.potionType){
                                    return; //user cannot pick up the same potion.
                                }
                                potionType = potion.potionType;        // store current weapon type
                                
                                // Play collect sound 
                                sounds.potionPickup.currentTime = 0;     
                                sounds.potionPickup.play(); 
                                console.log("You picked up potion: " + potionType);
                                let status = statusMap[potionType];
                                //set ammo
                                if (potionType == "green"){
                                    $("#item-slot > .icon").hide(); //hide all potions
                                    $("#green-potion-icon").show();
                                } else if (potionType == "purple"){
                                    $("#item-slot > .icon").hide(); //hide all potions
                                    $("#purple-potion-icon").show();
                                } else {
                                    $("#item-slot > .icon").hide(); //hide all potions
                                    $("#orange-potion-icon").show();
                                }
                                
                                const newPotionType = potion.randomize();
                                Socket.sendPotionPickup(potionPos.x, potionPos.y, newPotionType);
                                if (!weaponSelected){ //not weapon selected - meaning the player selected their item slot
                                    Socket.changePlayerSprite(playerId, status); //change sprite
                                }
                                //console.log("New weapon spawned: " + newWeaponType);
                                //weapon.setXY(-1000, -1000); will fix later
                                // Respawn after 10 seconds
                                /*
                                setTimeout(() => {
                                    weapon.setXY(weaponPoints[index].x, weaponPoints[index].y);
                                }, 10000);*/
                            }
                        });
                    }
                }
            });

            // Add these variables to track shooting state
            let isShooting = false;
            let shootInterval = null;
            // SHOOTING BULLETS
            // the mouse event listeners. adjust firing rate.
            $(document).on('mousedown', function(event) {
                if (event.button === 0) { // Left mouse button
                    // if on potion slot, consume potion and return
                    if (weaponSelected == 0) {
                        consumePotion();
                        return
                    };

                    isShooting = true;
                    shoot(); // Shoot immediately on press
                    /*
                    let firing_period;
                    if (weaponType == "AR"){
                        firing_period = 175; //set firing period
                    } else if (weaponType == "SMG"){
                        firing_period = 125;
                    } else {
                        firing_period = 450;
                    }*/
                    shootInterval = setInterval(shoot, 50); //call shoot again
                }
            });

            $(document).on('mouseup', function(event) {
                if (event.button === 0) { // Left mouse button

                    // if on potion slot, continue consuming potion and return
                    if (weaponSelected == 0) {
                        return
                    };

                    isShooting = false;
                    if (shootInterval) {
                        clearInterval(shootInterval);
                        shootInterval = null;
                    }
                }
            });

            // Make sure to also handle if mouse leaves the window
           $(document).on('mouseleave', function() {

                // if on potion slot, continue consuming potion and return
                if (weaponSelected == 0) {
                    return
                };

                isShooting = false;
                if (shootInterval) {
                    clearInterval(shootInterval);
                    shootInterval = null;
                }
            });

            function shoot(){
                if (gameActive){
                    //console.log("Shoot!");
                    if (weaponType && weaponSelected && ammo) {  // if they have a weapon, and the user has it selected, and they have ammo
                        // Create a new bullet at player1's position
                        if (player1.fire(currentTime, weaponType) && playerId == 1) {       // check if can fire based on fire rate
                            // console.log(currentTime);
                            //console.log("Fired a " + weaponType + " bullet");
                            const playerPos = player1.getXY();
                            const angle = player1.getAngle();
                            //const bullet = Bullet(context, playerPos.x, playerPos.y, angle, weaponType, gameArea, obstacles);
                            Socket.pushBullet(playerPos.x, playerPos.y, angle, playerId, weaponType); //pass bullet object parameters to websocket
                            //bullets.push(bullet); //to be deleted
                            ammo--;
                            $("#ammo-counter").text(ammo); //update ammo-counter in html
                        }

                        if (player2.fire(currentTime, weaponType) && playerId == 2) {       // check if can fire based on fire rate
                            // console.log(currentTime);
                            //console.log("Fired a " + weaponType + " bullet");
                            const playerPos = player2.getXY();
                            const angle = player2.getAngle();
                            //const bullet = Bullet(context, playerPos.x, playerPos.y, angle, weaponType, gameArea, obstacles);
                            Socket.pushBullet(playerPos.x, playerPos.y, angle, playerId, weaponType); 
                            //bullets.push(bullet); //to be deleted
                            ammo--;
                            $("#ammo-counter").text(ammo); //update ammo-counter in html
                        }
                    }
                }
            }

            // consume potion
            function consumePotion(){
                if (playerId == 1){
                    setTimeout(() => {
                        //player1.consumePotion(potionType);
                        //potionType = null;
                        $("#weapon-slot").css("border-color", "green");
                        $("#item-slot").css("border-color", "grey");
                        weaponSelected = 1;
                        Socket.changePlayerSprite(playerId, statusMap[weaponType]);
                        //Socket.updatePlayerAnV(playerId, player1.getAttackPower(), player1.getVulnerability());
                        Socket.updatePlayerAnV(playerId, potionType);
                        $("#item-slot > .icon").hide();
                    }, 2500);
                } else {
                    setTimeout(() => {
                        //player2.consumePotion(potionType);
                        //potionType = null;
                        $("#weapon-slot").css("border-color", "green");
                        $("#item-slot").css("border-color", "grey");
                        weaponSelected = 1;
                        Socket.changePlayerSprite(playerId, statusMap[weaponType]);
                        Socket.updatePlayerAnV(playerId, potionType);
                        //Socket.updatePlayerAnV(playerId, player2.getAttackPower(), player2.getVulnerability());
                        $("#item-slot > .icon").hide();
                    }, 2500);
                }
            }

            //PLAYER MOVEMENT
            function getMovementVector() {
                let dx = 0, dy = 0;
                if (keys['w']) dy -= 1;   // north
                if (keys['s']) dy += 1;   // south
                if (keys['a']) dx -= 1;   // west
                if (keys['d']) dx += 1;   // east

                // If both axes are non‑zero we are moving diagonally → normalize
                if (dx !== 0 && dy !== 0) {
                    const length = Math.hypot(dx, dy); // √(dx²+dy²) == √2
                    dx /= length;
                    dy /= length;
                }
                return {dx, dy};
            }

            function updateHPLine(player_num, health) {
                // Ensure health is within valid range (0-100)
                health = Math.max(0, Math.min(100, health));
                //console.log(`#player ${player_num} HP: ${health}`);
    
                // Get the SVG line element based on player ID
                const hpLine = $(`#player${player_num}-hpLine`);
                    // Get the original full width (you might need to adjust these values)
                const startX = Number(hpLine.attr("x1"));
                const endX = Number(hpLine.attr("x2"));

                if (player_num == 1){ //player 1
                    //console.log(startX);
                    const currentEndX = startX + Math.floor((health / 100) * (p1_hpLine_x2_init - startX));
                    //console.log(currentEndX);
                    hpLine.attr("x2", currentEndX);
                } else { //player 2
                    const currentStartX = endX - Math.floor((health / 100) * (endX - p2_hpLine_x1_init));
                    //console.log(currentStartX);
                    hpLine.attr("x1", currentStartX);
                }
            }

            /*Global functions that socket.js can call*/
            window.updatePlayerMovement = function(dx, dy, mouseX, mouseY, playerIndex) {
                if (playerIndex === 1 && player1) {
                    if (dx !== 0 || dy !== 0) {
                        player1.setVelocity(dx, dy);
                    } else {
                        player1.stop();
                    }
                    player1.setAngle(mouseX, mouseY);
                } else if (playerIndex === 2 && player2) {
                    if (dx !== 0 || dy !== 0) {
                        player2.setVelocity(dx, dy);
                    } else {
                        player2.stop();
                    }
                    player2.setAngle(mouseX, mouseY);
                }
            };

            window.addBullet = function(x,y,angle,shooterId,weaponType){
                //play gun sound
                let gunSound = sounds[weaponType]; 
                gunSound.currentTime = 0;     // play from the start
                gunSound.play();
                //push bullet to bullets array
                const bullet = Bullet(context, x, y, angle, shooterId, weaponType, gameArea, obstacles);
                bullets.push(bullet);
            };

            window.changePlayerSprite = function(playerId, status){
                if (playerId == 1){
                    player1.setStatusSprite(status);
                } else {
                    player2.setStatusSprite(status);
                }
            };

            window.syncPlayersPos = function(playerPosJSON){
                const playerPosData = JSON.parse(playerPosJSON);
                player1.setXY(playerPosData.player1[0], playerPosData.player1[1]);
                player1.setHP(playerPosData.player1[2]);
                player2.setXY(playerPosData.player2[0], playerPosData.player2[1]);
                player2.setHP(playerPosData.player2[2]);

                $("#player1-HP").text(player1.getHP()); //update health display
                updateHPLine(1, player1.getHP());

                $("#player2-HP").text(player2.getHP()); //update health display
                updateHPLine(2, player2.getHP());
            };

            window.updatePlayerAnV = function(playerId, potion_drink_type){
                if (playerId == 1){
                    player1.consumePotion(potion_drink_type);
                } else {
                    player2.consumePotion(potion_drink_type);
                }
                potionType = null;
            }

            /*Global functions END*/

            function restartRound(){
                player1.stop();
                player2.stop();
                weaponType = null; //reset weapon type
                potionType = null; //reset potion type
                ammo = 0; //reset ammo
                infBullet = 0; //turn off infinite bullet
                suddenDeath = 0; //turn off sudden death
                $("#sudden-death-tag").hide();
                obstacles = [...saved_obstacles]; //restore obstacles
                $("#ammo-counter").text(ammo); //update ammo-counter 
                $(".icon").hide(); //hide all weapons and potion icons
                // add randomize weapon and potion ? 
                player1.setXY(p1_init_pos.x, p1_init_pos.y);
                player2.setXY(p2_init_pos.x, p2_init_pos.y);
                //add function to return every player to their original state (position, sprite, health, potion effect, no weapons or items)
                player1.restore();
                player2.restore();
                $("#player1-HP").text(player1.getHP()); //update health display
                $(`#player1-hpLine`).attr("x2", p1_hpLine_x2_init); //restore health bar
                $("#player2-HP").text(player2.getHP()); //update health display
                $(`#player2-hpLine`).attr("x1", p2_hpLine_x1_init); //restore health bar
                sounds.mainGame.pause();
                sounds.mainGame.currentTime = 0;
                SyncPlayers();
            }

            let countdown = 3;
            function handleRoundStart(){ //handle round screen
                countdown--;
                if (countdown > 0){ //countdown not yet 0
                    if (countdown == 1){
                        $(".round-text").text("FIGHT!");
                    }
                    setTimeout(handleRoundStart, 1000);
                } else { //countdown at 0. 
                    round_num++;
                    countdown = 3; //reset countdown
                    $(".round-text").text("ROUND "+round_num);
                    $(".round-text").hide();
                    gameActive = true;
                    sounds.mainGame.play();
                }
            }

            function SyncPlayers(){
                try{
                    const player1Pos = player1.getXY();
                    const player2Pos = player2.getXY();
                    const player1HP = player1.getHP();
                    const player2HP = player2.getHP();
                    //console.log(player2HP);
                    const players_pos = {
                    player1: [player1Pos.x, player1Pos.y, player1HP],
                    player2: [player2Pos.x, player2Pos.y, player2HP]
                    }
                    Socket.syncPos(playerId, JSON.stringify(players_pos));
                } catch (error) {
                    console.error('Error syncing:', error);
                }
            }

            const handlePlayerDeath = (player_num) => {
                if (player_num == 1){
                    $("#result-text").css("color", "blue");
                    $("#result-text span").text("2"); //player 2 won the round
                    player2_score++; //update score
                    $("#player2-score").text( player2_score);
                } else {
                    $("#result-text").css("color", "red");
                    $("#result-text span").text("1"); //player 1 won the round
                    player1_score++; //update score
                    $("#player1-score").text( player1_score);
                }

                $("#result-text").show();
                let timerDuration;
                if (timeRemaining > 3){
                    timerDuration = 3000;
                } else {
                    timerDuration = (timeRemaining-1)*1000
                }
                earlyFinishTimer = setTimeout(()=>{
                    earlyFinish = 1;
                    console.log("Starting a new round!");
                    earlyFinishTimer = null; // Reset the timer reference
                }, timerDuration); //give three seconds of downtime
            }



            //Get Player Id
            setTimeout(() => { //wait for connection to be fully established
                console.log('Attempting getPlayerNum');
                Socket.getPlayerNum();
                setTimeout(()=> {
                    console.log("You are Player "+ playerId);
                    if (playerId == 1){
                        $("#p1-indicator").show(); //show player1 indicator
                    } else if (playerId == 2){
                        $("#p2-indicator").show(); //show player2 indicator
                    }
                    Socket.getInitPotions();
                    Socket.getInitWeapons();
                }, 150); //wait till the commmunication finishes
            }, 150); //wait till connection with server

            let lastTime = 0;
            let earlyFinishTimer = null;
            let earlyFinish = 0;
            let suddenDeath = 0;
            let timeRemaining;
            /* main processing of the game */
            function doFrame(now){
                const dt = (now - lastTime) / 1000;   // delta time in seconds. Make player and bullet speed independent of framerate.
                lastTime = now;
                /* Update the time remaining (if game is active) */
                if (gameActive){
                    currentTime = now / 1000; //update current time in seconds

                    if (roundStartTime == 0) roundStartTime = now;

                    const roundTimeSoFar = now - roundStartTime;
                    timeRemaining = Math.ceil((totalRoundTime * 1000 - roundTimeSoFar) / 1000);
                    $("#time-remaining").text(timeRemaining);

                    if (timeRemaining <= 15 && !suddenDeath){ //last 15 seconds - sudden death mode
                        obstacles = []; //clear obstacles. remove all obstacles.
                        suddenDeath = 1;
                        player1.setSuddenDeath();
                        player2.setSuddenDeath();
                        $("#sudden-death-tag").show();
                    }

                    if (timeRemaining <= 0 || earlyFinish){ //round duration is over or round finishes early
                        if (round_num <= 3 && (player1_score < 2) && (player2_score < 2)){ //not final round and neither player has scored 2
                            if (!earlyFinish){ //if the round did not end early but rather ended due to time out
                                if (player1.getHP() >= player2.getHP()){
                                    player1_score++;
                                    $("#player1-score").text(player1_score);
                                } else {
                                    player2_score++;
                                    $("#player2-score").text(player2_score);
                                }
                            }
                            
                            roundStartTime = 0; //reset roundStartTime
                            gameActive = false;
                            earlyFinish = 0; //reset earlyFinish
                            $("#result-text").hide();
                            $("#time-remaining").text(totalRoundTime);
                            $(".round-text").show(); //show round-text
                            restartRound();
                            setTimeout(handleRoundStart, 1000);
                        } else {
                            // Stop the game
                            cancelAnimationFrame(animationId);
                            restartRound(); //restart round for the next game
                            // stop the game music
                            sounds.mainGame.pause();
                            // play the game over music
                            sounds.gameover.play(); 

                            // Optional: Show game over message
                            if (player1_score >= 2){
                                $("#result-text").text("P1 WON!");
                                $("#result-text").css("color", "red");
                            } else if (player2_score >= 2) {
                                $("#result-text").text("P2 WON!");
                                $("#result-text").css("color", "blue");
                            }   

                            // Remove event listeners to stop interaction
                            $(document).off("keydown keyup mousemove");

                            return; //change later
                        }
                    }
                }

                if (gameActive){
                    if (player1.isDead() || player2.isDead()){ //stop both players if either player got killed. prevent potential desync
                        player1.stop();
                        player2.stop();
                    } else {
                        const {dx, dy} = getMovementVector();
                        Socket.handlePlayerMovement(dx,dy,mouseX,mouseY);
                    }
                }

                /* update sprites */
                player1.update(now, dt);
                player2.update(now, dt); //will update to dt if it works.

                window.weapons.forEach((weapon) => {
                    weapon.update(now); 
                });
                window.potions.forEach((potion) => {
                    potion.update(now);
                });
                for (let i = bullets.length - 1; i >= 0; i--) {
                    bullets[i].update(now, dt);
                    // check if bullet hit player
                    const bulletPos = bullets[i].getXY();
                    if (bullets[i].getBoundingBox().isPointInBox(player1.getXY().x, player1.getXY().y) && bullets[i].getShooterId() != 1) {
                        if (!player1.isDead()){
                            player1.getHit(bullets[i].bulletType, player2.getAttackPower());
                            bullets[i].remove(); //kill the bullet
                            $("#player1-HP").text(player1.getHP()); //update health display
                            updateHPLine(1, player1.getHP());
                            SyncPlayers();
                            if (player1.isDead() && earlyFinishTimer === null){ //Handle player death
                                setTimeout(handlePlayerDeath(1), 110);
                            }
                        }
                    }
                    else if (bullets[i].getBoundingBox().isPointInBox(player2.getXY().x, player2.getXY().y) && bullets[i].getShooterId() != 2) {
                        if (!player2.isDead()){
                            player2.getHit(bullets[i].bulletType, player1.getAttackPower());
                            bullets[i].remove(); //kill the bullet
                            $("#player2-HP").text(player2.getHP()); //update health display
                            updateHPLine(2, player2.getHP());
                            SyncPlayers();
                            //delay(150);
                            if (player2.isDead() && earlyFinishTimer === null){
                                setTimeout(handlePlayerDeath(2), 110);
                            }   
                        }
                    }

                    // check if bullet alive
                    if (!bullets[i].isAlive()) {
                        bullets.splice(i, 1); // Remove dead bullet
                    }
                }

                /* Randomize the weapon */
                window.weapons.forEach((weapon, index) => {
                    if (weapon.getAge(now) >= itemMaxAge) {
                        const weaponPos = weapon.getXY();
                        const newWeaponType = weapon.randomize(); 
                        Socket.sendWeaponUpdate(weaponPos.x, weaponPos.y, newWeaponType);
                        // weapon.setXY(weaponPoints[index].x, weaponPoints[index].y); 
                    }
                });
                /* Randomize the potion */
                window.potions.forEach((potion, index) => {
                    if (potion.getAge(now) >= itemMaxAge) {
                        const potionPos = potion.getXY();
                        const newPotionType = potion.randomize(); 
                        Socket.sendPotionUpdate(potionPos.x, potionPos.y, newPotionType);
                        //potion.setXY(potionPoints[index].x, potionPoints[index].y); 
                    }
                });

                //sync movements through socket
                if (gameActive){
                    SyncPlayers();
                }

                /* Clear the screen */
                context.clearRect(0, 0, cv.width, cv.height);

                /* draw the sprites */
                for (let i = 0; i < obstacles.length; i++){ //obstcales are rendered first
                    obstacles[i].draw();
                }

                window.weapons.forEach((weapon) => {
                    weapon.draw(); 
                }); 

                window.potions.forEach((potion) => {
                    potion.draw(); 
                });

                bullets.forEach((bullet) => {
                    if (bullet.isAlive()) {
                        bullet.draw();
                    }                     
                });

                player1.draw();

                player2.draw();

                /* Process the next frame */
                animationId = requestAnimationFrame(doFrame);
            }

            // Moving the Weapon + Potion at the Start of the Game
            window.weapons.forEach((weapon, index) => {
                weapon.randomize();
                weapon.setXY(weaponPoints[index].x, weaponPoints[index].y);
            }) 
            window.potions.forEach((potion, index) => {
                potion.randomize();
                potion.setXY(potionPoints[index].x, potionPoints[index].y);
            })          
            
            //sounds.mainGame.currentTime = 0;
            //sounds.mainGame.play();

            /* Start the game */
            animationId = requestAnimationFrame(doFrame);

            setTimeout(handleRoundStart, 1000);
        });
    </script>
</body>
