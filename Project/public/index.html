<!DOCTYPE html>
<html>
<head>
    <title>Showdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }
        
        body {
            font-family: "Press Start 2P", sans-serif;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        canvas {
            /* Stretch the background while preserving its aspect ratio */
            background: url(assets/game_arena.jpg);
            background-size: 1536px 695px;
            background-repeat: no-repeat;

            /* Make the canvas itself fill the window */
            width: 1536px;
            height: 695px;
            position: absolute;
        }
    </style>
</head>

<body>
    <div id = "game-container">
        <canvas width="1536px" height="695px"></canvas>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
    <script>
    $(function(){
        const cv = $("canvas").get(0);
        const ctx = cv.getContext("2d");
    });

    </script>
</body>
</html>
